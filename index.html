<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 網格浮水印產生器</title>
    <!-- 引入必要的函式庫 -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-md rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">PDF 網格浮水印</h1>
            <p class="text-gray-500 text-sm mt-2">安全、快速、本地處理</p>
        </div>

        <div class="space-y-5">
            <!-- 浮水印文字輸入 -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">浮水印文字</label>
                <input type="text" id="wmText" value="INTERNAL USE ONLY" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                    placeholder="輸入要顯示的文字...">
            </div>

            <!-- 檔案上傳區 -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">選擇 PDF 檔案</label>
                <div class="relative">
                    <input type="file" id="pdfFile" accept="application/pdf" class="hidden">
                    <label for="pdfFile" id="fileLabel" class="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <span class="text-xs text-gray-500 px-4 text-center" id="fileNameDisplay">點擊或拖放 PDF</span>
                    </label>
                </div>
            </div>

            <!-- 操作按鈕 -->
            <div class="grid grid-cols-1 gap-3">
                <button id="downloadPdfBtn" class="flex items-center justify-center w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition-all disabled:opacity-50">
                    下載浮水印 PDF
                </button>
                <button id="downloadJpgBtn" class="flex items-center justify-center w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-md transition-all disabled:opacity-50">
                    下載 JPG 圖片 (ZIP)
                </button>
            </div>

            <!-- 狀態提示 -->
            <div id="statusMessage" class="hidden text-center text-sm font-medium p-2 rounded-lg"></div>
        </div>

        <div class="mt-8 pt-4 border-t border-gray-100 text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Local Browser Processing • No Server Upload</p>
        </div>
    </div>

    <!-- 用於渲染 PDF 的隱藏 Canvas -->
    <canvas id="renderCanvas" style="display:none;"></canvas>

    <script>
        const { PDFDocument, rgb, degrees, StandardFonts } = PDFLib;
        // 設定 PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const fileInput = document.getElementById('pdfFile');
        const fileLabel = document.getElementById('fileLabel');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const pdfBtn = document.getElementById('downloadPdfBtn');
        const jpgBtn = document.getElementById('downloadJpgBtn');
        const statusMsg = document.getElementById('statusMessage');
        const wmTextInput = document.getElementById('wmText');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.innerText = e.target.files[0].name;
                fileLabel.classList.add('border-blue-400', 'bg-blue-50');
            }
        });

        const showStatus = (text, type = 'info') => {
            statusMsg.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-blue-100', 'text-blue-700', 'bg-green-100', 'text-green-700');
            if (type === 'error') statusMsg.classList.add('bg-red-100', 'text-red-700');
            else if (type === 'success') statusMsg.classList.add('bg-green-100', 'text-green-700');
            else statusMsg.classList.add('bg-blue-100', 'text-blue-700');
            statusMsg.innerText = text;
            statusMsg.classList.remove('hidden');
        };

        // 核心功能：合成浮水印
        async function getWatermarkedPdf() {
            const file = fileInput.files[0];
            const text = wmTextInput.value.trim();
            if (!file || !text) throw new Error('請確認已選擇檔案並輸入文字');

            const arrayBuffer = await file.arrayBuffer();
            const pdfDoc = await PDFDocument.load(arrayBuffer);
            const font = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
            const pages = pdfDoc.getPages();

            pages.forEach(page => {
                const { width, height } = page.getSize();
                const stepX = 220; 
                const stepY = 160; 
                for (let x = -width; x < width * 2; x += stepX) {
                    for (let y = -height; y < height * 2; y += stepY) {
                        page.drawText(text, {
                            x: x, y: y, size: 28, font: font,
                            color: rgb(0.6, 0.6, 0.6), opacity: 0.25, 
                            rotate: degrees(-30), // 已將旋轉角度修改為 -30 度
                        });
                    }
                }
            });
            return await pdfDoc.save();
        }

        // 下載 PDF
        pdfBtn.addEventListener('click', async () => {
            try {
                pdfBtn.disabled = true;
                const originalText = pdfBtn.innerHTML;
                pdfBtn.innerHTML = '<span class="loader"></span> 處理中...';
                showStatus('正在生成 PDF...');

                const pdfBytes = await getWatermarkedPdf();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Watermarked_${fileInput.files[0].name}`;
                link.click();

                showStatus('✅ PDF 下載成功', 'success');
                pdfBtn.innerHTML = originalText;
            } catch (err) {
                showStatus(err.message, 'error');
            } finally {
                pdfBtn.disabled = false;
            }
        });

        // 下載 JPG (轉圖邏輯)
        jpgBtn.addEventListener('click', async () => {
            try {
                jpgBtn.disabled = true;
                const originalText = jpgBtn.innerHTML;
                jpgBtn.innerHTML = '<span class="loader"></span> 轉圖中...';
                showStatus('正在合成浮水印並轉換成圖片...');

                const pdfBytes = await getWatermarkedPdf();
                
                const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
                const pdf = await loadingTask.promise;
                const zip = new JSZip();
                const canvas = document.getElementById('renderCanvas');
                const ctx = canvas.getContext('2d');

                showStatus(`正在處理第 1 / ${pdf.numPages} 頁...`);

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 }); 
                    
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({
                        canvasContext: ctx,
                        viewport: viewport
                    }).promise;

                    const imageData = canvas.toDataURL('image/jpeg', 0.85);
                    const base64Data = imageData.replace(/^data:image\/jpeg;base64,/, "");
                    
                    zip.file(`page_${i}.jpg`, base64Data, { base64: true });
                    showStatus(`正在處理第 ${i} / ${pdf.numPages} 頁...`);
                }

                showStatus('正在打包 ZIP...');
                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `Images_${fileInput.files[0].name.replace('.pdf', '')}.zip`;
                link.click();

                showStatus('✅ JPG 打包下載成功', 'success');
                jpgBtn.innerHTML = originalText;
            } catch (err) {
                console.error(err);
                showStatus('轉換失敗：' + err.message, 'error');
            } finally {
                jpgBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
